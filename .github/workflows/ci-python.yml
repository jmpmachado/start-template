# STATUS: optional — activate by setting PROJECT_STACK=python in CONFIGURE.md. Dormant until then.
# ci-python.yml — Python CI lane for child projects with PROJECT_STACK=python.
# Activated by ci-matrix.yml via workflow_call. Not triggered directly.
# Runs: ruff lint + pytest, matrix Python 3.11/3.12.
name: CI — Python

on:
  workflow_call:

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt
          elif [ -f requirements.txt ]; then pip install -r requirements.txt
          fi

      - name: Lint (ruff)
        run: |
          pip install ruff --quiet
          ruff check . --output-format=github

      - name: Type check (pyright, if config present)
        if: hashFiles('pyrightconfig.json') != ''
        run: |
          pip install pyright --quiet
          pyright

      - name: Test (pytest)
        run: |
          pip install pytest pytest-cov --quiet
          pytest --tb=short --cov=src --cov-report=term-missing
