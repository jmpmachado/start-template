# STATUS: optional — activate by setting PROJECT_STACK=go in CONFIGURE.md. Dormant until then.
# ci-go.yml — Go CI lane for child projects with PROJECT_STACK=go.
# Activated by ci-matrix.yml via workflow_call. Not triggered directly.
# Runs: go vet + staticcheck + go test, matrix Go 1.22/1.23.
name: CI — Go

on:
  workflow_call:

jobs:
  go:
    name: Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.22", "1.23"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage report
        run: go tool cover -func=coverage.out
